{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediGest – Home</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #e3f2fd, #bbdefb, #90caf9);
            min-height: 100vh;
            margin: 0;
            font-family: "Segoe UI", sans-serif;
        }

        /* NAVBAR */
        .navbar-custom {
            background: linear-gradient(90deg, #0b3d91, #0d47a1);
        }

        .logout-btn {
            background: linear-gradient(45deg, #4dabf7, #1e88e5);
            color: white;
            font-weight: 600;
            border-radius: 6px;
            padding: 6px 16px;
        }

        /* LAYOUT PRINCIPAL */
        .main-layout {
            display: flex;
            justify-content: center;
            padding-top: 70px;
        }

        .welcome-box {
            width: 100%;
            max-width: 900px;
        }

        /* ===== BIENVENUE HORIZONTAL ===== */
        .welcome-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .welcome-text {
            font-size: 32px;
            font-weight: 800;
            color: #0a2540;
        }

        .welcome-subtext {
            font-size: 16px;
            color: #375a7f;
            margin-top: 6px;
        }

        .badge-custom {
            background: linear-gradient(90deg, #64b5f6, #1e88e5);
            color: white;
            padding: 6px 18px;
            border-radius: 20px;
            font-weight: 600;
            font-size: 14px;
        }

        /* ===== BOUTONS ===== */
        .role-buttons {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 15px;
        }

        .role-card {
            width: 360px;
            border-radius: 18px;
            text-decoration: none;
            transition: all 0.25s ease;
            box-shadow: 0 8px 22px rgba(13,71,161,0.25);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .role-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 30px rgba(13,71,161,0.4);
        }

        .role-agent {
            background: linear-gradient(135deg, #64b5f6, #1e88e5);
        }

        .role-med {
            background: linear-gradient(135deg, #0d47a1, #08306b);
        }

        .role-title {
            font-size: 26px;
            font-weight: 800;
            margin-bottom: 10px;
            color: white;
        }

        .role-desc {
            font-size: 16px;
            text-align: center;
            color: rgba(255,255,255,0.9);
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .welcome-header {
                flex-direction: column;
                gap: 10px;
                text-align: center;
            }

            .role-buttons {
                flex-direction: column;
                gap: 25px;
                align-items: center;
            }

            .role-card {
                width: 100%;
                max-width: 400px;
            }
        }
    </style>
</head>

<body>

<nav class="navbar navbar-expand-lg navbar-custom px-4">
    <a class="navbar-brand fw-bold text-white" href="/">MediGest</a>
    <div class="ms-auto">
        <a class="btn logout-btn" href="{% url 'logout' %}">Se Déconnecter</a>
    </div>
</nav>

<div class="main-layout">
    <div class="welcome-box">

        <!-- BIENVENUE HORIZONTAL -->
        <div class="welcome-header">
            <div>
                <div class="welcome-text">
                    Bienvenue,
                </div>
                <div class="welcome-subtext">
                    Choisissez votre espace de travail
                </div>
            </div>
            <span class="badge-custom">Gestion Hospitalière</span>
        </div>

        <!-- BOUTONS -->
        <div class="role-buttons">

            <a href="{% url 'agent_tables' %}" class="role-card role-agent">
                <div class="role-title">Accès Agent</div>
                <div class="role-desc">
                    Gestion administrative et dossiers
                </div>
            </a>

            <a href="{% url 'medecin_tables' %}" class="role-card role-med">
                <div class="role-title">Accès Médecin</div>
                <div class="role-desc">
                    Consultations et suivi médical
                </div>
            </a>

        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
