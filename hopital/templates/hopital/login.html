{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediGest – Connexion</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(135deg, #e3f2fd, #bbdefb, #90caf9);
            margin: 0;
            height: 100vh;
        }

        /* Animation d'apparition */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .login-card {
            background: rgba(255,255,255,0.92);
            border-radius: 14px;
            padding: 40px;
            width: 400px;
            box-shadow: 0 0 22px rgba(0,0,0,0.20);
            animation: fadeIn 0.9s ease-out;
        }

        /* Titre + icône stéthoscope en CSS */
        .title {
            font-size: 2rem;
            font-weight: 700;
            color: #0d6efd;
            letter-spacing: 1px;
            position: relative;
            display: inline-block;
        }
        .title::after {
            
            font-size: 1.4rem;
            position: absolute;
            right: -35px;
            top: 2px;
        }

        .subtitle {
            font-size: 1rem;
            color: #6c757d;
        }

        /* Effet glow médical sur input */
        input.form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 6px rgba(13, 110, 253, 0.5);
        }

        /* Bouton créer compte style léger */
        .btn-outline {
            border-color: #0d6efd;
            color: #0d6efd;
        }
        .btn-outline:hover {
            background: #0d6efd;
            color: white;
        }
    </style>
</head>

<body>

<div class="container d-flex justify-content-center align-items-center min-vh-100">
    <div class="login-card text-center">

        <h1 class="title mb-1">MediGest</h1>
        <p class="subtitle mb-4">Votre plateforme numérique de gestion hospitalière</p>

        {% if error %}
            <div class="alert alert-danger">{{ error }}</div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-3 text-start">
                <label class="form-label">Nom d'utilisateur :</label>
                <input type="text" name="username" class="form-control" placeholder="Entrez votre identifiant" required>
            </div>

            <div class="mb-3 text-start">
                <label class="form-label">Mot de passe :</label>
                <input type="password" name="password" class="form-control" placeholder="••••••••" required>
            </div>

            <button type="submit" class="btn btn-primary w-100 mt-2">Se connecter</button>
        </form>

        <p class="mt-3">
            <a href="{% url 'password_reset' %}" class="text-decoration-none"> Mot de passe oublié ?</a>
        </p>

        
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
