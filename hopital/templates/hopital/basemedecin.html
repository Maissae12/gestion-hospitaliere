{% load static %}
<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestion d’Hôpital</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #e3f2fd, #bbdefb, #90caf9);
            min-height: 100vh;
        }

        /* NAVBAR FONCÉE AVEC DÉGRADÉ */
        .navbar-custom {
            background: linear-gradient(90deg, #0b3d91, #0d47a1);
        }

        .navbar-custom .nav-link {
            color: white;
            font-weight: 500;
        }

        .navbar-custom .nav-link:hover {
            background-color: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
        }

        /* BOUTON SE DÉCONNECTER BLEU DÉGRADÉ */
        .logout-btn {
            background: linear-gradient(45deg, #4dabf7, #1e88e5);
            color: white;
            border-radius: 5px;
            font-weight: 600;
            padding: 6px 16px;
            transition: background 0.3s;
        }

        .logout-btn:hover {
            background: linear-gradient(45deg, #1e88e5, #1565c0);
            color: white;
        }

        main {
            padding: 30px;
        }

        footer {
            background: #0b3d91;
            color: white;
            text-align: center;
            padding: 15px 0;
            font-weight: 500;
        }
    </style>
</head>
<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-custom px-4">
    <a class="navbar-brand fw-bold text-white" href="{% url 'home_dashboard' %}">MediGest</a>
    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto">
            
            
            <li class="nav-item"><a class="nav-link" href="{% url 'consultation_list' %}">Consultations</a></li>
            <li class="nav-item"><a class="nav-link" href="{% url 'prescription_list' %}">Prescriptions</a></li>
            <li class="nav-item"><a class="nav-link" href="{% url 'medicament_list' %}">Médicaments</a></li>
            <li class="nav-item"><a class="nav-link" href="{% url 'dossier_listmedecin' %}">Dossiers médicaux</a></li>

        </ul>

        <a class="btn btn-outline-light btn-sm me-2" href="{% url 'vue_spa' %}">
                <i class="bi bi-grid"></i> Interface Vue.js
            </a>
            <a class="btn logout-btn" href="{% url 'logout' %}">Se Déconnecter</a>
    </div>
</nav>

<!-- CONTENU PRINCIPAL -->
<main>
    {% block content %}
    <!-- Le contenu des pages (listes, formulaires, etc.) va s'afficher ici -->
    {% endblock %}
</main>

<!-- FOOTER -->
<footer>
    &copy; 2025 - Système de gestion hospitalière
</footer>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
